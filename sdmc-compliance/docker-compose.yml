version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: sdmc
      POSTGRES_PASSWORD: sdmc
      POSTGRES_DB: permits
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sdmc"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  opa:
    image: openpolicyagent/opa:0.70.0
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ./policy/opa:/policies
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8181/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "8181:8181"

  evidence-ledger:
    build: ./services/evidence-ledger
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://sdmc:sdmc@postgres:5432/permits"
      OPA_URL: "http://opa:8181"
    ports:
      - "8000:8000"

volumes:
  pgdata:
